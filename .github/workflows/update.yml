name: Update Reversed Shadowrocket Rules

on:
  schedule:
    # 每天北京时间 8:00 (UTC 0:00) 自动更新
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run update script
        run: |
          chmod +x update.sh
          ./update.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update reversed rules $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
